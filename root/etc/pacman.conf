UseSyslog

# Download
CheckSpace
VerbosePkgLists
ParallelDownloads = 8
DownloadUser = alpm

# Signiture
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Required


# Repos

[system]
Include = /etc/pacman.d/mirrorlist

[world]
Include = /etc/pacman.d/mirrorlist

[galaxy]
Include = /etc/pacman.d/mirrorlist
